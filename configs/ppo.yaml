# PPO Training (Stage 3) Configuration

# Model settings
model_path: "checkpoints/sft_model/best"
max_length: 2048

# PPO hyperparameters
learning_rate: 1.41e-5
batch_size: 256
mini_batch_size: 64
gradient_accumulation_steps: 1

# PPO-specific
ppo_epochs: 4
kl_penalty: 0.1
clip_range: 0.2
gamma: 1.0
lam: 0.95

# Generation settings
temperature: 0.8
top_p: 0.9
top_k: 50

# Training settings
total_steps: 10000
save_interval: 500
log_interval: 10

# Hardware
device: "cuda"  # or "cpu"

# Paths
output_dir: "checkpoints/ppo_model"

# Reward weights (must sum to ~1.0)
xml_validity_weight: 0.4
harmony_weight: 0.3
voice_leading_weight: 0.2
style_weight: 0.1
