# Reward Model Configuration

# Weights for each reward component
xml_validity_weight: 0.4
harmony_weight: 0.3
voice_leading_weight: 0.2
style_weight: 0.1

# XML Validity settings
require_part_list: true
require_measures: true
min_notes: 10

# Harmony settings
check_key_consistency: true
check_common_progressions: true
diatonic_threshold: 0.6

# Voice Leading settings
check_parallel_fifths: true
check_parallel_octaves: true
max_parallels: 2
melodic_smoothness_weight: 0.3

# Style settings
corpus_dir: "data/processed"
default_composer: "average"
